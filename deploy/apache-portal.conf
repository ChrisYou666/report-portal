# report-collection-portal Apache 配置
# 放到 /etc/apache2/conf-available/portal.conf
# 然后执行：a2enconf portal && systemctl reload apache2

# 启用必要模块（如未启用）：
# a2enmod proxy proxy_http rewrite

# ── API 反向代理（需在 Alias 之前） ──────────────────────────
ProxyPass        /report-portal/api/     http://127.0.0.1:8000/api/
ProxyPassReverse /report-portal/api/     http://127.0.0.1:8000/api/

ProxyPass        /report-portal/storage/ http://127.0.0.1:8000/storage/
ProxyPassReverse /report-portal/storage/ http://127.0.0.1:8000/storage/

# ── 前端静态文件 ──────────────────────────────────────────────
Alias /report-portal /var/www/html/report-collection-portal/frontend/dist

<Directory /var/www/html/report-collection-portal/frontend/dist>
    Options -Indexes
    AllowOverride None
    Require all granted

    # SPA 路由回退
    RewriteEngine On
    RewriteBase /report-portal/

    # /report-portal/indicator 及其子路由 → indicator.html
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^indicator(/.*)?$ indicator.html [L]

    # 其余路由 → 主门户 index.html
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ index.html [L]
</Directory>
